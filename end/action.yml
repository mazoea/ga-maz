name: 'Mazoea default end action'
description: 'Common tasks after job end'
inputs:
  CHOWN_DIR:
    description: 'change owner of directory'
    default: ''
    required: false
  UID:
    description: 'uid'
    default: '0'
    required: false
  GID:
    description: 'gid'
    default: '0'
    required: false
  MSG:
    description: 'message'
    required: false
    default: ''
  MS_TEAMS_URI:
    description: 'webhook url'
    required: false
    default: ''
runs:
  using: "composite"
  steps:

# linux

    - name: inputs
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      env:
        IN_UID: ${{ inputs.UID }}
        IN_GID: ${{ inputs.GID }}
        IN_MSG: ${{ inputs.MSG }}
      run: |
        echo "$IN_UID"
        echo "$IN_GID"
        printf '%s\n' "$IN_MSG"
        echo "${BRANCH:-}"

    - name: basic info
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        pwd || true
        echo "=========================="
        echo `hostname` || true
        echo "=========================="
        cat /opt/info/hostname || true
        echo "=========================="
        id || true
        echo "=========================="
        env || true
        echo "=========================="
        ls -lah || true
        echo "=========================="
        df -h | grep /$ || true
        echo "=========================="

    - name: services
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        git --version || true
        echo "=========================="

    - name: cleanup - change owner
      if: ${{ runner.os == 'Linux' && inputs.UID != '0' }}
      shell: bash
      env:
        IN_UID: ${{ inputs.UID }}
        IN_GID: ${{ inputs.GID }}
      run: |
        # Validate UID/GID look like positive integers before letting them
        # near a chown invocation. The `--` after `-R` stops chown from
        # interpreting a value beginning with `-` as an option.
        case "$IN_UID" in (''|*[!0-9]*) echo "invalid UID: $IN_UID" >&2; exit 1;; esac
        case "$IN_GID" in (''|*[!0-9]*) echo "invalid GID: $IN_GID" >&2; exit 1;; esac
        echo "chown -R -- $IN_UID:$IN_GID ./"
        chown -R -- "$IN_UID:$IN_GID" ./ || true

    - name: cleanup - change owner to default
      if: ${{ runner.os == 'Linux' && inputs.CHOWN_DIR != '' }}
      shell: bash
      env:
        IN_CHOWN_DIR: ${{ inputs.CHOWN_DIR }}
      run: |
        UUID=$(id -u)
        GGID=$(id -g)
        # Reject paths that look like options (-x, --foo) or contain shell
        # metacharacters; pass `--` to chown so the path is treated as an
        # operand even if validation is bypassed.
        case "$IN_CHOWN_DIR" in
          -*|*[';&|`$']*) echo "invalid CHOWN_DIR: $IN_CHOWN_DIR" >&2; exit 1;;
        esac
        echo "chown -R -- $UUID:$GGID $IN_CHOWN_DIR"
        docker run --rm -v "$(pwd)":/app -w /app alpine chown -R -- "$UUID:$GGID" "$IN_CHOWN_DIR" || true

    - name: cleanup - docker
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        echo "Docker repos login so we need to logout otherwise tokens stay and cause problems for next runs"
        docker logout ghcr.io || true

    - name: detailed info
      if: ${{ runner.os == 'Linux' && inputs.MSG != '' }}
      shell: bash
      env:
        IN_MSG: ${{ inputs.MSG }}
      run: |
        printf '%s\n' "$IN_MSG"

# windows

    - name: inputs
      if: ${{ runner.os == 'Windows' }}
      # Use PowerShell, not cmd, for printing untrusted env vars. cmd
      # re-parses the line after %VAR% expansion, so a value containing
      # `&`, `|`, `>`, or quotes can break out of the echo and inject
      # additional commands. PowerShell does not re-parse $env:VAR.
      shell: pwsh
      env:
        IN_UID: ${{ inputs.UID }}
        IN_GID: ${{ inputs.GID }}
        IN_MSG: ${{ inputs.MSG }}
      run: |
        Write-Output $env:IN_UID
        Write-Output $env:IN_GID
        Write-Output $env:IN_MSG
        Write-Output $env:BRANCH

    - name: services
      if: ${{ runner.os == 'Windows' }}
      shell: cmd
      run: |
        git --version || true
        echo "=========================="

    - name: detailed info
      if: ${{ runner.os == 'Windows' && inputs.MSG != '' }}
      # See note above on shell: pwsh; %IN_MSG% in cmd is injectable.
      shell: pwsh
      env:
        IN_MSG: ${{ inputs.MSG }}
      run: |
        Write-Output $env:IN_MSG
