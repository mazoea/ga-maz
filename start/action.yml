name: 'Mazoea default start action'
description: 'Common tasks after job start'
inputs:
  UID:
    description: 'uid'
    default: '0'
    required: false
  GID:
    description: 'gid'
    default: '0'
    required: false
  MS_TEAMS_URI:
    description: 'webhook url'
    required: false
    default: ''
  MSG:
    description: 'optional informational message to echo on Windows runners'
    required: false
    default: ''
runs:
  using: "composite"
  steps:

# linux

    - name: inputs
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      env:
        IN_UID: ${{ inputs.UID }}
        IN_GID: ${{ inputs.GID }}
      run: |
        echo "$IN_UID"
        echo "$IN_GID"
        echo "${BRANCH:-}"

    - name: basic info
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        pwd || true
        echo "=========================="
        echo `hostname` || true
        echo "=========================="
        cat /opt/info/hostname || true
        echo "=========================="
        id || true
        echo "=========================="
        env || true
        echo "=========================="
        ls -lah || true
        echo "=========================="
        df -h | grep /$ || true
        echo "=========================="
        cat /proc/cpuinfo || true
        echo "=========================="

    - name: services
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        echo "==== 2024.12 fixing GA/git checkout issues"
        git config --global http.version HTTP/1.1 || true
        echo "=========================="
        git --version || true
        echo "=========================="
        git config --list --show-origin
        echo "=========================="

    - name: cleanup - change owner
      if: ${{ runner.os == 'Linux' && inputs.UID != '0' }}
      shell: bash
      env:
        IN_UID: ${{ inputs.UID }}
        IN_GID: ${{ inputs.GID }}
      run: |
        # Validate UID/GID before they reach chown. Quoting prevents shell
        # injection but a value beginning with `-` could still be parsed as
        # a chown option. Reject anything that isn't pure digits.
        case "$IN_UID" in (''|*[!0-9]*) echo "invalid UID: $IN_UID" >&2; exit 1;; esac
        case "$IN_GID" in (''|*[!0-9]*) echo "invalid GID: $IN_GID" >&2; exit 1;; esac
        # MAZUID / MAZGID are passed into the container via -e, never interpolated into the shell line.
        # `--` after `-R` stops chown from treating values as options if the validation above is ever bypassed.
        docker run --rm -e MAZUID="$IN_UID" -e MAZGID="$IN_GID" -v "$(pwd)":/maz alpine:3.19.1 /bin/sh -c 'ls -lah /maz && echo chown -R -- "$MAZUID":"$MAZGID" /maz && (chown -R -- "$MAZUID":"$MAZGID" /maz | tail -25) && ls -lah /maz' || true

# windows

    - name: inputs
      if: ${{ runner.os == 'Windows' }}
      # PowerShell, not cmd: cmd re-parses the command line after %VAR%
      # expansion, so a value containing `&`, `|`, `>`, or quotes can
      # break out of the echo and inject additional commands. PowerShell
      # does not re-parse $env:VAR.
      shell: pwsh
      env:
        IN_UID: ${{ inputs.UID }}
        IN_GID: ${{ inputs.GID }}
        IN_MSG: ${{ inputs.MSG }}
      run: |
        Write-Output $env:IN_UID
        Write-Output $env:IN_GID
        Write-Output $env:IN_MSG
        Write-Output $env:BRANCH

    - name: detailed info
      if: ${{ runner.os == 'Windows' }}
      shell: cmd
      run: |
        echo "=========================="
        ipconfig || true
        echo "=========================="

    - name: services
      if: ${{ runner.os == 'Windows' }}
      shell: cmd
      run: |
        echo "==== 2024.12 fixing GA/git checkout issues"
        git config --global http.version HTTP/1.1 || true
        echo "=========================="
        set
        echo "=========================="
        git --version || true
        echo "=========================="
        git config --list --show-origin
        echo "=========================="

    - name: detailed info
      if: ${{ runner.os == 'Windows' && inputs.MSG != '' }}
      # See note above on shell: pwsh; %IN_MSG% in cmd is injectable.
      shell: pwsh
      env:
        IN_MSG: ${{ inputs.MSG }}
      run: |
        Write-Output $env:IN_MSG
